  /* TechCrunch Daily — Blog Design */
  .techcrunch {
    font-family: var(--font-sans);
    color: var(--text-primary);
    max-width: 800px;
    margin: 0 auto;
  }
  .blog-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: var(--space-md) 0; border-bottom: 1px solid var(--border);
    margin-bottom: var(--space-lg);
  }
  .blog-logo { font-size: 22px; font-weight: 800; }
  .blog-logo span { color: var(--accent); }
  .blog-nav { display: flex; gap: var(--space-md); }
  .blog-nav a {
    color: var(--text-secondary); text-decoration: none;
    font-size: 13px; font-weight: 500; transition: color var(--transition);
  }
  .blog-nav a:hover { color: var(--text-primary); }
  .blog-search-section {
    display: flex; gap: var(--space-sm); align-items: center;
    padding: var(--space-md); background: var(--bg-tertiary);
    border-radius: var(--radius); margin-bottom: var(--space-lg);
  }
  .blog-search-section input[type="search"] {
    flex: 1; padding: 8px 12px; background: var(--bg-primary);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-primary); font-size: 14px; outline: none;
  }
  .blog-search-section input[type="search"]:focus { border-color: var(--accent); }
  .blog-search-section select {
    padding: 8px 12px; background: var(--bg-primary);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    color: var(--text-primary); font-size: 13px; outline: none;
  }
  .blog-search-section select:focus { border-color: var(--accent); }
  .article-card {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius); padding: var(--space-md);
    margin-bottom: var(--space-md);
  }
  .article-card h3 { font-size: 17px; margin-bottom: 4px; }
  .article-card h3 a { color: var(--text-primary); text-decoration: none; }
  .article-card h3 a:hover { color: var(--accent); }
  .article-meta {
    font-size: 12px; color: var(--text-muted); margin-bottom: var(--space-sm);
  }
  .article-excerpt { font-size: 13px; color: var(--text-secondary); line-height: 1.6; }
  .article-tags { display: flex; gap: var(--space-xs); margin-top: var(--space-sm); }
  .tag {
    padding: 2px 8px; background: var(--bg-tertiary);
    border-radius: 4px; font-size: 11px; color: var(--text-muted);
  }
  .blog-forms-section {
    display: grid; grid-template-columns: 1fr 1fr; gap: var(--space-md);
    margin-top: var(--space-xl); padding-top: var(--space-lg);
    border-top: 1px solid var(--border);
  }
  .blog-form {
    background: var(--bg-secondary); border: 1px solid var(--border);
    border-radius: var(--radius); padding: var(--space-md);
  }
  .blog-form h3 { font-size: 15px; margin-bottom: var(--space-md); }
  .blog-form input, .blog-form textarea {
    width: 100%; padding: 8px 10px; margin-bottom: var(--space-sm);
    background: var(--bg-primary); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text-primary);
    font-size: 13px; font-family: var(--font-sans); outline: none;
  }
  .blog-form textarea { resize: vertical; min-height: 80px; }
  .blog-form input:focus, .blog-form textarea:focus { border-color: var(--accent); }
  .blog-form button {
    padding: 8px 20px; background: var(--accent); color: white;
    border: none; border-radius: var(--radius-sm); font-size: 13px;
    font-weight: 600; cursor: pointer; transition: all var(--transition);
  }
  .blog-form button:hover { background: var(--accent-hover); }
  @media (max-width: 600px) { .blog-forms-section { grid-template-columns: 1fr; } }
</style>

  <div class="blog-forms-section">
    <form class="blog-form" data-aip-confirm="true" action="/newsletter/subscribe" aria-label="Newsletter signup">

  <!-- ═══ Main Script ═══ -->
  <script type="module">
    import { createAgentTerminal } from './framework/terminal.js';
    import { createDemo } from './framework/harness.js';
    import { generalScenario } from './scenarios/general.js';
    import { ecommerceScenario } from './scenarios/ecommerce.js';

    // Create terminal in a temporary container — harness moves it
    const temp = document.createElement('div');
    const terminal = createAgentTerminal(temp);

    // Create demo
    const demo = createDemo({
      container: '#app',
      scenarios: {
        general: generalScenario,
        ecommerce: ecommerceScenario,
      },
      terminal,
      defaultScenario: 'general',
      defaultMode: 'auto-inference',
    });

    // Expose for debugging
    window.__demo = demo;
  </script>
</body>
